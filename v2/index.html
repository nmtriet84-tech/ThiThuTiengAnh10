<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Exam Generator v3 - Professional Edition</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Times New Roman', Times, serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }

        /* Toolbar */
        .toolbar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px);
            padding: 12px 24px; border-radius: 50px; border: 1px solid var(--border);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            display: flex; gap: 15px; align-items: center; z-index: 1000;
        }
        .toolbar select, .toolbar input {
            padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px;
        }
        .btn {
            padding: 8px 16px; border-radius: 50px; border: none; font-weight: 600; cursor: pointer;
            transition: all 0.2s; font-size: 14px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn-outline { background: white; border: 1px solid var(--border); }
        .btn-outline:hover { background: #f1f5f9; }

        /* A4 Page Styling */
        #output { display: flex; flex-direction: column; align-items: center; margin-top: 100px; }
        .a4-page {
            width: 210mm; background: white;
            padding: 10mm 10mm 15mm 15mm; margin-bottom: 20px; position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.05); color: #000;
            font-size: var(--print-font-size, 11pt); line-height: 1.4;
        }
        .toolbar select, .toolbar input, .btn { font-family: 'Inter', sans-serif; }

        /* Exam Typography */
        .header { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.9em; color: #000; }
        .title { text-align: center; font-weight: bold; font-size: 1.2em; margin: 15px 0; color: #000; }
        .section-title { font-weight: bold; text-transform: uppercase; margin-top: 15px; color: #000; }
        .instruction { font-style: italic; color: #000; font-size: 0.95em; }
        .passage { border: 1px solid #000; padding: 10px; margin: 10px 0; background: #fff; color: #000; }
        .question { margin-top: 10px; page-break-inside: avoid; color: #000; }
        .options { display: grid; margin-top: 4px; gap: 4px; color: #000; }
        .options.one-col { grid-template-columns: 1fr; }
        .options.two-cols { grid-template-columns: 1fr 1fr; }
        .options.four-cols { grid-template-columns: repeat(4, 1fr); }
        .opt-label { font-weight: bold; margin-right: 4px; }
        .page-num { position: absolute; bottom: 10mm; left: 50%; transform: translateX(-50%); font-size: 9pt; color: #000; }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; padding: 0; margin: 0; }
            .toolbar { display: none; }
            .a4-page { 
                margin: 0; box-shadow: none; width: 210mm; height: 297mm; 
                page-break-after: always; break-after: page; 
            }
            #output { margin-top: 0; display: block; }
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <div style="font-weight:700; color:var(--primary); margin-right:10px;">EXAM v3</div>
        <input type="text" id="examCode" placeholder="Mã đề" value="101" style="width: 80px;">
        <select id="fontSize">
            <option value="10pt">Cỡ chữ: 10pt</option>
            <option value="11pt" selected>Cỡ chữ: 11pt</option>
            <option value="12pt">Cỡ chữ: 12pt</option>
        </select>
        <button class="btn btn-primary" onclick="buildExam()">Tạo đề</button>
        <button class="btn btn-outline" onclick="window.print()">In đề (PDF)</button>
        <button class="btn btn-outline" id="exportDocxBtn">Xuất Word</button>
    </div>

    <div id="output">
        <div style="padding: 100px; color: #64748b; font-style: italic;">Nhấn "Tạo đề" để bắt đầu...</div>
    </div>

    <script src="lib/docx.js"></script>
    <script src="lib/FileSaver.js"></script>
    <script src="engine.js"></script>
</body>
</html>
